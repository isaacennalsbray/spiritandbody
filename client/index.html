<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spirit and Body</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #0a0a0f;
        overflow: hidden;
      }
      /* Scale the game to fit any window, centered with black bars */
      #game-container {
        position: fixed;
        top: 0; left: 0;
        width: 960px;
        height: 640px;
        transform-origin: top left;
        /* JS sets translate + scale to center and fit */
      }
      #game-container canvas {
        display: block;
        width: 960px !important;
        height: 640px !important;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      function scaleGame() {
        const s = Math.min(
          window.innerWidth  / 960,
          window.innerHeight / 640
        );
        const tx = (window.innerWidth  - 960 * s) / 2;
        const ty = (window.innerHeight - 640 * s) / 2;
        const el = document.getElementById('game-container');
        if (el) el.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
      }
      // Run immediately and on resize
      scaleGame();
      window.addEventListener('resize', scaleGame);
    </script>
  </body>
</html>
